#
# General options
#

# prefix (like vim leader key)
unbind C-b
unbind C-Space

set -g prefix C-Space

bind C-Space send-prefix
bind C-Space last-window

# bind ctrl+f for session finder (tmux sessionizer)
bind -n C-f display-popup -E "tms"

# use vim key bindings
setw -g mode-keys vi

# scrollback
set -g history-limit 50000

# eliminate escape delay for vim/neovim
set -sg escape-time 0

# mouse
set -g mouse on

# stay in copy mode after mouse select (no jump to bottom); clear selection so scroll doesn't extend it
set -g @yank_action 'copy-pipe'

# increase repeat time for repeatable commands
set -g repeat-time 1000

# start window index at 1
set -g base-index 1

# start pane index at 1
setw -g pane-base-index 1

# highlight window when it has new activity
setw -g monitor-activity on
set  -g visual-activity on

# re-number windows when one is closed
set -g renumber-windows on

#
#  Key Bindings
#

# create 25% lower split
unbind t
bind t split-window -p 25

#
# List of plugins
#

set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tpm'

#
# Colors
#

# add truecolor support
set -g default-terminal 'tmux-256color'
set -ga update-environment "COLORTERM"

# Tc = old-style tmux flag; RGB = standard terminfo name — both kept for compatibility
set -ag terminal-overrides ',xterm-256color:Tc:RGB'
set -ag terminal-overrides ',wezterm:Tc:RGB'

#
# Status bar
#

# max session name length
set -g status-left-length 50

# trim long session names
set -g status-left " #{?#{e|>:#{n:session_name},20},#{=17:session_name}...,#{session_name}} "

# non-active windows: no symbols
set -g window-status-format " #I:#W "

# active window: reverse only (no symbols, no bold)
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "reverse"

# windows w/ activity: underline only
set -g window-status-activity-style "underscore"

#
# Initialize TMUX plugin manager (keep at the bottom of tmux.conf)
#
run '~/.tmux/plugins/tpm/tpm'
